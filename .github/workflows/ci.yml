name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  LC_ALL: C
  LANG: C
  TZ: UTC
  CC: gcc
  CFLAGS: -std=c11 -Wall -Wextra -Werror

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build and run deterministic test suite
        run: |
          make test

      - name: Compile API contract checks
        run: |
          make test_sched_api.o
          make test_cpu_state_api.o

  codeql:
    name: CodeQL analysis
    runs-on: ubuntu-latest
    needs: build-and-test

    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ "c-cpp" ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: manual

      - name: Build CodeQL targets
        run: |
          make test
          make test_sched_api.o
          make test_cpu_state_api.o

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
